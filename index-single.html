<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recolhimento UFU</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        [x-cloak] { display: none; }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-20" x-data="app()" x-init="init()">

    <nav class="bg-white shadow-md border-b sticky top-0 z-50">
        <div class="flex justify-around p-2">
            <button x-on:click="aba = 'processo'" x-bind:class="aba === 'processo' ? 'tab-active' : 'text-slate-400'" class="px-3 py-2 text-[10px] uppercase transition-all flex flex-col items-center"><span>📁</span><span>Processo</span></button>
            <button x-on:click="aba = 'itens'" x-bind:class="aba === 'itens' ? 'tab-active' : 'text-slate-400'" class="px-3 py-2 text-[10px] uppercase transition-all flex flex-col items-center" x-bind:disabled="!processoId"><span>🪑</span><span>Itens</span></button>
            <button x-on:click="aba = 'pdf'; if(processoId) buscaSei = processo.sei" x-bind:class="aba === 'pdf' ? 'tab-active' : 'text-slate-400'" class="px-3 py-2 text-[10px] uppercase flex flex-col items-center transition-all"><span>📄</span><span>Documento</span></button>
        </div>
    </nav>

    <div class="p-4 max-w-lg mx-auto">
        <h1 class="text-center font-black text-slate-700 mb-4 uppercase tracking-tighter text-xl">Recolhimento UFU</h1>

        <div x-show="aba === 'processo'" class="space-y-4">
            <div class="bg-white p-4 rounded-xl shadow border-t-4 border-emerald-500">
                <h2 class="font-bold mb-4 text-emerald-700 text-[10px] uppercase tracking-widest text-center">Identificação do Processo</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Número SEI</label>
                        <input class="w-full p-3 border rounded-lg text-lg font-mono bg-blue-50 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="23117.000000/0000-00" x-model="processo.sei" x-on:input="processo.sei = API.mascaraSEI(processo.sei)" x-on:blur="buscarProcessoExistente()">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Pró-Reitoria / Unidade</label>
                        <input class="w-full p-2 border rounded-lg bg-slate-50" list="unidades-list" x-model="processo.pro_reitoria_unidade" placeholder="Selecione a Unidade">
                        <datalist id="unidades-list"><template x-for="u in unidades_db"><option x-bind:value="u.nome"></option></template></datalist>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <select class="p-2 border rounded-lg bg-white" x-model="processo.campus_id" x-on:change="carregarBlocos()">
                            <option value="">Campus</option>
                            <template x-for="c in campus"><option x-bind:value="c.id" x-text="c.nome"></option></template>
                        </select>
                        <select class="p-2 border rounded-lg bg-white" x-model="processo.bloco_id">
                            <option value="">Bloco</option>
                            <template x-for="b in blocos"><option x-bind:value="b.id" x-text="b.nome"></option></template>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-widest">Sala / Espaço (Obrigatório)</label>
                        <input class="w-full p-2 border rounded-lg bg-slate-50" x-model="processo.sala" placeholder="Ex: Sala 204">
                    </div>
                </div>
                <button class="w-full mt-6 bg-emerald-600 text-white p-4 rounded-xl font-bold shadow-lg" x-on:click="salvarProcesso()"><span x-text="processoId ? 'ATUALIZAR DADOS' : 'INICIAR PROCESSO'"></span></button>
            </div>
        </div>

        <div x-show="aba === 'itens'" x-cloak class="space-y-4">
            <div class="bg-white p-4 rounded-xl shadow border-t-4 border-blue-500">
                <p x-show="csvCarregando" class="text-xs text-amber-600 font-bold mb-2">⏳ Carregando base de patrimônio...</p>
                <p x-show="csvCarregado && !csvCarregando" class="text-xs text-slate-500 mb-2">✓ Base em memória (<span x-text="baseCSV.length"></span> itens)</p>
                <p x-show="csvErro" class="text-xs text-red-600 font-bold mb-2">❌ <span x-text="csvErro"></span> <button type="button" class="underline ml-1" x-on:click="carregarBaseCSV()">Tentar de novo</button></p>
                <div class="flex gap-2 mb-3 items-center">
                    <input class="flex-1 p-3 border rounded-lg bg-yellow-50 font-bold text-xl outline-none focus:ring-2 focus:ring-yellow-400" placeholder="Nº Patrimônio" type="number" x-model="item.patrimonio" x-on:input.debounce.300ms="buscarPatrimonio()" x-bind:disabled="item.semPatrimonio || !csvCarregado">
                    <label class="flex items-center gap-1 text-[10px] font-bold text-red-600 uppercase whitespace-nowrap cursor-pointer bg-red-50 border border-red-200 rounded-lg px-3 py-3">
                        <input type="checkbox" x-model="item.semPatrimonio" x-on:change="if(item.semPatrimonio) { item.patrimonio = 'Sem número'; item.descricao = ''; patrimonioNaoEncontrado = false; $nextTick(function(){ $refs.campoDescricao.focus(); }); } else { item.patrimonio = ''; }"> Sem patrimônio
                    </label>
                </div>
                <div class="mb-3">
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Descrição do Bem</label>
                    <textarea x-ref="campoDescricao" class="w-full p-2 border rounded-lg text-sm bg-slate-50" rows="2" x-model="item.descricao" x-bind:readonly="!item.bvm && !item.semPatrimonio" placeholder="Descrição Automática"></textarea>
                    <template x-if="patrimonioNaoEncontrado"><p class="text-[10px] text-red-600 font-bold mt-1 uppercase italic">⚠️ Patrimônio não localizado na base</p></template>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <select class="w-full p-2 border rounded-lg text-sm font-bold bg-white" x-model="item.tamanho">
                        <option value="">Tamanho</option>
                        <option>P</option><option>M</option><option>G</option><option>GG</option>
                    </select>
                    <div class="flex flex-col justify-center gap-1 text-[10px] font-bold uppercase">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" x-model="item.viavel"> Viável</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" x-model="item.bvm" x-on:change="if(item.bvm) { item.descricao = ''; $nextTick(function() { $refs.campoDescricao.focus(); }); }"> BVM</label>
                    </div>
                </div>
                <div class="mb-4 p-3 border-2 border-dashed rounded-lg bg-slate-50 text-center">
                    <label class="block text-sm font-bold text-slate-600 mb-2 uppercase">📷 Foto do Item</label>
                    <input type="file" accept="image/*" capture="environment" class="text-sm w-full file:mr-2 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-500 file:text-white file:font-bold" x-on:change="capturarFoto($event)">
                    <div tabindex="0" class="mt-2 p-4 border-2 border-dashed border-amber-400 rounded-lg bg-amber-50 cursor-pointer focus:ring-2 focus:ring-amber-500 outline-none" x-on:paste.prevent="colarFoto($event)" x-on:click="$el.focus(); colarFotoBtn()">
                        <p class="text-sm font-bold text-amber-700">📋 Colar imagem</p>
                        <p class="text-[10px] text-amber-600 mt-1">Clique aqui e pressione Ctrl+V, ou clique para colar</p>
                    </div>
                    <template x-if="item.foto"><div class="mt-2 text-sm text-emerald-600 font-bold">✓ Foto OK</div></template>
                </div>
                <button class="w-full bg-blue-600 text-white p-4 rounded-xl font-black shadow-lg text-lg" x-on:click="salvarItem()" x-bind:disabled="loading"><span x-text="loading ? 'SALVANDO...' : 'GRAVAR ITEM'"></span></button>
            </div>
            <div x-show="itens.length > 0" class="bg-white p-3 rounded-xl shadow">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-2">Itens (<span x-text="itens.length"></span>)</h3>
                <div class="space-y-2 max-h-40 overflow-y-auto">
                    <template x-for="i in itens" x-bind:key="i.patrimonio">
                        <div class="text-xs p-2 bg-slate-50 rounded flex justify-between">
                            <span class="font-mono font-bold" x-text="i.patrimonio"></span>
                            <span class="text-slate-500 truncate ml-2" x-text="i.descricao"></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="aba === 'pdf'" x-cloak class="space-y-4">
            <div class="bg-white p-4 rounded-xl shadow border-l-4 border-blue-600">
                <h2 class="font-bold mb-4 text-blue-700 text-[10px] uppercase text-center">Gerar Documento para anexar ao SEI</h2>
                <input class="w-full p-3 border rounded-lg font-mono text-sm bg-slate-50 mb-4" x-model="buscaSei" x-on:input="buscaSei = API.mascaraSEI(buscaSei)" placeholder="23117.000000/0000-00">
                <button class="w-full bg-blue-700 text-white p-4 rounded-xl font-black shadow-lg" x-on:click="gerarDocumento()" x-bind:disabled="exportando"><span x-text="exportando ? 'GERANDO...' : '📄 GERAR DOCUMENTO'"></span></button>
            </div>
        </div>
    </div>

    <script>
// ========== API (Supabase + Power Automate) ==========
var SUPABASE_URL = "https://oyvvvxpgqhyowvfaepgu.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dnZ2eHBncWh5b3d2ZmFlcGd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NDUxODEsImV4cCI6MjA4NTMyMTE4MX0.9MIFMZWqJWzXRW3J6v__tC_JFBhn-Tbomu8ABDKxkOM";
var POWER_AUTOMATE_URL = "https://defaultcd5e6d23cb99418988ab1a9021a0c4.51.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/3ba53f8c4f1345f5a93729b3a1b849b0/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=2zgtu_kmMbEjoCexDvlvSYeH1tHYTzDDkKliszTfavY";
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function mascaraSEI(v) {
    v = v.replace(/\D/g, "");
    if (v.length > 17) v = v.substring(0, 17);
    v = v.replace(/^(\d{5})(\d)/, "$1.$2");
    v = v.replace(/^(\d{5})\.(\d{6})(\d)/, "$1.$2/$3");
    v = v.replace(/^(\d{5})\.(\d{6})\/(\d{4})(\d)/, "$1.$2/$3-$4");
    return v;
}
function processarFoto(file) {
    return new Promise(function(resolve) {
        var reader = new FileReader();
        reader.onload = function(event) {
            var img = new Image();
            img.onload = function() {
                var canvas = document.createElement("canvas");
                var MAX = 1024;
                var w = img.width, h = img.height;
                if (w > MAX) { h *= MAX / w; w = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL("image/jpeg", 0.7));
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });
}
function carregarCampus() { return db.from("campus").select("*").order("nome").then(function(r) { return r.data || []; }); }
function carregarUnidades() { return db.from("unidades").select("*").order("nome").then(function(r) { return r.data || []; }); }
function carregarBlocos(campusId) { if (!campusId) return Promise.resolve([]); return db.from("blocos").select("*").eq("campus_id", campusId).order("nome").then(function(r) { return r.data || []; }); }
function buscarProcessoPorSEI(sei) { if (sei.length < 20) return Promise.resolve(null); return db.from("processos").select("*").eq("sei", sei).maybeSingle().then(function(r) { return r.data; }); }
function carregarItensProcesso(processoId) { return db.from("patrimonios").select("*").eq("processo_id", processoId).order("created_at", { ascending: false }).then(function(r) { return r.data || []; }); }
function salvarProcesso(processo) {
    return db.from("processos").upsert([{ sei: processo.sei, pro_reitoria_unidade: processo.pro_reitoria_unidade, campus_id: processo.campus_id || null, bloco_id: processo.bloco_id || null, sala: processo.sala }], { onConflict: "sei" }).select().single().then(function(r) { if (r.error) throw r.error; return r.data; });
}
function salvarItem(item, processoId) {
    return db.from("patrimonios").insert([{ patrimonio: item.patrimonio, descricao: item.descricao, tamanho: item.tamanho, viavel: item.viavel, bvm: item.bvm, foto: item.foto, processo_id: processoId }]).select().single().then(function(r) { if (r.error) throw r.error; return r.data; });
}
function enviarParaSharePoint(processo, itens) {
    var itensNaoEnviados = itens.filter(function(i) { return !i.enviado_sharepoint; });
    if (itensNaoEnviados.length === 0) return Promise.resolve([]);
    var resultados = [];
    var promessas = itensNaoEnviados.map(function(item) {
        var payload = { SEI: processo.sei, Unidade: processo.pro_reitoria_unidade || "", Sala: processo.sala || "", Patrimonio: String(item.patrimonio), Descricao: item.descricao || "", Tamanho: item.tamanho || "", Viavel: item.viavel ? "Sim" : "Não", BVM: item.bvm ? "Sim" : "Não", FotoBase64: item.foto || "", DataRegistro: new Date().toISOString() };
        return fetch(POWER_AUTOMATE_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }).then(function(res) {
            if (res.ok) return db.from("patrimonios").update({ enviado_sharepoint: true }).eq("id", item.id).then(function() { resultados.push({ patrimonio: item.patrimonio, ok: true }); });
            resultados.push({ patrimonio: item.patrimonio, ok: false });
        }).catch(function(e) { resultados.push({ patrimonio: item.patrimonio, ok: false, erro: e.message }); });
    });
    return Promise.all(promessas).then(function() { return resultados; });
}
window.API = { db: db, mascaraSEI: mascaraSEI, processarFoto: processarFoto, carregarCampus: carregarCampus, carregarUnidades: carregarUnidades, carregarBlocos: carregarBlocos, buscarProcessoPorSEI: buscarProcessoPorSEI, carregarItensProcesso: carregarItensProcesso, salvarProcesso: salvarProcesso, salvarItem: salvarItem, enviarParaSharePoint: enviarParaSharePoint };
    </script>
    <script>
// ========== APP (Alpine) ==========
var BASE_CSV_URL = "https://custodioufu.netlify.app/base.csv";
function app() {
    return {
        aba: "processo", campus: [], blocos: [], itens: [], baseCSV: [], csvCarregando: true, csvCarregado: false, csvErro: null, unidades_db: [], processoId: null, loading: false, exportando: false, buscaSei: "", patrimonioNaoEncontrado: false,
        processo: { sei: "", pro_reitoria_unidade: "", campus_id: "", bloco_id: "", sala: "" },
        item: { patrimonio: "", descricao: "", tamanho: "", viavel: false, bvm: false, foto: "", semPatrimonio: false },
        init: function() { var self = this; API.carregarCampus().then(function(d) { self.campus = d; }); API.carregarUnidades().then(function(d) { self.unidades_db = d; }); this.carregarBaseCSV(); },
        carregarBaseCSV: function() {
            var self = this;
            this.csvCarregando = true; this.csvCarregado = false; this.csvErro = null;
            fetch(BASE_CSV_URL).then(function(res) { if (!res.ok) throw new Error("CSV não encontrado: " + res.status); return res.text(); })
                .then(function(texto) {
                    var r = Papa.parse(texto, { header: true, skipEmptyLines: true });
                    if (r.errors.length > 0) throw new Error("Erro ao ler CSV");
                    var raw = r.data, campos = r.meta.fields || (raw[0] ? Object.keys(raw[0]) : []), map = self._mapearColunas(campos);
                    self.baseCSV = raw.map(function(linha) { return { NroPatrimonio: self._valor(linha, map.NroPatrimonio), CodioBarra: self._valor(linha, map.CodioBarra), DescricaoBem: self._valor(linha, map.DescricaoBem) }; }).filter(function(l) { return l.NroPatrimonio !== undefined || l.CodioBarra !== undefined; });
                    self.csvCarregando = false; self.csvCarregado = true;
                }).catch(function(err) { self.csvCarregando = false; self.csvErro = err && err.message ? err.message : "Erro ao carregar base"; });
        },
        _mapearColunas: function(campos) {
            var nro = ["NroPatrimonio", "Nro Patrimônio", "Patrimônio", "Numero", "Número", "Nro"], cod = ["CodioBarra", "CodigoBarra", "Código de Barras", "Codigo Barras"], desc = ["DescricaoBem", "Descrição do Bem", "Descricao", "Descrição"];
            function achar(lista) {
                for (var i = 0; i < campos.length; i++) { var c = (campos[i] || "").replace(/\uFEFF/g, "").trim(); for (var j = 0; j < lista.length; j++) if (c === lista[j]) return campos[i]; }
                for (var k = 0; k < campos.length; k++) { var key = (campos[k] || "").replace(/\uFEFF/g, "").trim(); if (/patrim|numero|nro/i.test(key)) return campos[k]; if (/codigo|barra/i.test(key)) return campos[k]; if (/descri/i.test(key)) return campos[k]; }
                return campos[0] || null;
            }
            return { NroPatrimonio: achar(nro) || campos[0], CodioBarra: achar(cod) || campos[1], DescricaoBem: achar(desc) || campos[2] };
        },
        _valor: function(linha, chave) { if (!chave) return undefined; var v = linha[chave]; return v !== undefined && v !== null ? String(v).trim() : undefined; },
        carregarBlocos: function() { var self = this; API.carregarBlocos(this.processo.campus_id).then(function(d) { self.blocos = d; }); },
        buscarProcessoExistente: function() {
            var self = this;
            API.buscarProcessoPorSEI(this.processo.sei).then(function(data) {
                if (data) { self.processo = data; self.processoId = data.id; self.carregarBlocos(); API.carregarItensProcesso(data.id).then(function(itens) { self.itens = itens; }); alert("Processo carregado!"); self.aba = "itens"; }
            });
        },
        salvarProcesso: function() {
            var self = this;
            if (!this.processo.sei || this.processo.sei.length < 20) { alert("Preencha o Número SEI corretamente."); return; }
            if (!this.processo.pro_reitoria_unidade) { alert("Preencha a Pró-Reitoria / Unidade."); return; }
            if (!this.processo.campus_id) { alert("Selecione o Campus."); return; }
            if (!this.processo.sala) { alert("Preencha a Sala/Espaço."); return; }
            API.salvarProcesso(this.processo).then(function(data) { self.processoId = data.id; self.processo = data; self.aba = "itens"; });
        },
        buscarPatrimonio: function() {
            var v = String(this.item.patrimonio).trim();
            if (!v) { this.item.descricao = ""; this.patrimonioNaoEncontrado = false; return; }
            if (!this.csvCarregado || this.baseCSV.length === 0) { this.patrimonioNaoEncontrado = false; return; }
            var vNum = parseInt(v, 10);
            var achado = this.baseCSV.find(function(i) {
                var nroPat = parseInt(String(i.NroPatrimonio || "").trim(), 10), codBar = parseInt(String(i.CodioBarra || "").trim(), 10);
                if (!isNaN(nroPat) && nroPat === vNum) return true;
                if (!isNaN(codBar) && codBar !== 0 && codBar === vNum) return true;
                if (String(i.NroPatrimonio || "").trim() === v || String(i.CodioBarra || "").trim() === v) return true;
                return false;
            });
            this.item.descricao = achado ? (achado.DescricaoBem || "") : ""; this.patrimonioNaoEncontrado = !achado;
        },
        capturarFoto: function(e) { var self = this, file = e.target.files[0]; if (file) API.processarFoto(file).then(function(foto) { self.item.foto = foto; }); },
        colarFoto: function(e) {
            var self = this, items = e.clipboardData && e.clipboardData.items;
            if (!items) { alert("Navegador não suporta colar imagens."); return; }
            for (var i = 0; i < items.length; i++) if (items[i].type.indexOf("image") !== -1) { var blob = items[i].getAsFile(); if (blob) API.processarFoto(blob).then(function(foto) { self.item.foto = foto; }); return; }
            alert("Nenhuma imagem encontrada. Copie uma imagem primeiro e depois cole aqui (Ctrl+V).");
        },
        colarFotoBtn: function() {
            var self = this;
            if (!navigator.clipboard || !navigator.clipboard.read) { alert("Clique nesta área e use Ctrl+V para colar a imagem."); return; }
            navigator.clipboard.read().then(function(items) {
                for (var i = 0; i < items.length; i++) for (var j = 0; j < items[i].types.length; j++) if (items[i].types[j].indexOf("image") !== -1) { items[i].getType(items[i].types[j]).then(function(blob) { API.processarFoto(blob).then(function(foto) { self.item.foto = foto; }); }); return; }
                alert("Nenhuma imagem na área de transferência.");
            }).catch(function() { alert("Sem permissão para acessar clipboard. Clique nesta área e use Ctrl+V."); });
        },
        salvarItem: function() {
            var self = this;
            if (!this.item.patrimonio) { alert("Informe o Nº Patrimônio."); return; }
            if (this.item.patrimonio !== "Sem número" && this.itens.some(function(i) { return String(i.patrimonio) === String(self.item.patrimonio); })) { alert("Este patrimônio já foi cadastrado neste processo."); return; }
            if (this.item.semPatrimonio && !this.item.descricao.trim()) { alert("Informe a descrição do item."); return; }
            if (!this.item.semPatrimonio && !this.item.descricao && !this.item.bvm) { alert("Patrimônio não encontrado. Marque BVM para descrição manual."); return; }
            if (this.item.bvm && !this.item.descricao.trim()) { alert("Informe a descrição (BVM)."); return; }
            if (!this.item.tamanho) { alert("Selecione o Tamanho."); return; }
            if (!this.item.foto) { alert("Capture a Foto."); return; }
            this.loading = true;
            API.salvarItem(this.item, this.processoId).then(function() {
                self.itens.unshift({ patrimonio: self.item.patrimonio, descricao: self.item.descricao, tamanho: self.item.tamanho, viavel: self.item.viavel, bvm: self.item.bvm, foto: self.item.foto });
                self.item = { patrimonio: "", descricao: "", tamanho: "", viavel: false, bvm: false, foto: "", semPatrimonio: false }; self.patrimonioNaoEncontrado = false; self.loading = false;
            }).catch(function() { self.loading = false; });
        },
        carregarProcessoPDF: function() {
            var self = this;
            return API.buscarProcessoPorSEI(this.buscaSei).then(function(proc) {
                if (!proc) { alert("Processo não encontrado."); return null; }
                self.processo = proc; return API.carregarItensProcesso(proc.id).then(function(itens) { self.itens = itens; return proc; });
            });
        },
        gerarDocumento: function() {
            var self = this;
            this.carregarProcessoPDF().then(function(proc) {
                if (!proc) return;
                self.exportando = true; self.criarPDF();
                if (self.itens.length > 0) API.enviarParaSharePoint(self.processo, self.itens).then(function() { self.exportando = false; }).catch(function() { self.exportando = false; });
                else self.exportando = false;
            });
        },
        criarPDF: function() {
            var jsPDF = window.jspdf.jsPDF, doc = new jsPDF("p", "mm", "a4"), pageWidth = doc.internal.pageSize.getWidth(), itensParaPDF = this.itens.slice(), processo = this.processo, ITENS_POR_PAGINA = 5;
            function desenharCabecalho() {
                doc.setFontSize(14); doc.setFont("helvetica", "bold"); doc.text("Universidade Federal de Uberlândia", pageWidth / 2, 15, { align: "center" });
                doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.text(processo.pro_reitoria_unidade || "", pageWidth / 2, 21, { align: "center" });
                doc.line(15, 30, pageWidth - 15, 30); doc.text("PROCESSO SEI: " + processo.sei, 15, 38); doc.text("SALA / ESPAÇO: " + processo.sala, 15, 43);
            }
            for (var p = 0; p < itensParaPDF.length; p += ITENS_POR_PAGINA) {
                if (p > 0) doc.addPage();
                desenharCabecalho();
                var chunk = itensParaPDF.slice(p, p + ITENS_POR_PAGINA), fotos = [];
                var tableBody = chunk.map(function(i) { fotos.push(i.foto || ""); return [{ content: "", styles: { minCellHeight: 40 } }, "Patrimônio: " + i.patrimonio + "\nDescrição: " + i.descricao + "\nTamanho: " + i.tamanho + "\nViável: " + (i.viavel ? "Sim" : "Não") + "\nBVM: " + (i.bvm ? "Sim" : "Não") ]; });
                doc.autoTable({ startY: 48, head: [["Foto", "Detalhes"]], body: tableBody, columnStyles: { 0: { cellWidth: 45 }, 1: { cellWidth: "auto" } }, styles: { fontSize: 10.5, valign: "middle", cellPadding: 4 },
                    didDrawCell: (function(fotos) { return function(data) { if (data.column.index === 0 && data.cell.section === "body") { var img = fotos[data.row.index]; if (img) try { var cellW = data.cell.width - 4, cellH = data.cell.height - 4, size = Math.min(cellW, cellH), x = data.cell.x + 2 + (cellW - size) / 2, y = data.cell.y + 2 + (cellH - size) / 2; doc.addImage(img, "JPEG", x, y, size, size); } catch(e) {} } }; })(fotos) });
            }
            doc.save("Recolhimento_" + processo.sei + ".pdf");
        }
    };
}
    </script>
    <script src="https://unpkg.com/alpinejs" defer></script>
